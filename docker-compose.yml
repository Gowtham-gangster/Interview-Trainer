services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-interview-trainer-db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: ai_interview_trainer
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d ai_interview_trainer']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
